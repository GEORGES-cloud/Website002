name: Limpiar archivos huérfanos del servidor

# Borra por FTP archivos que ya no forman parte del sitio (imágenes y vídeos
# archivados) y que el sync incremental no elimina. Manual (workflow_dispatch),
# de un solo uso. No toca ningún archivo en uso.

on:
  workflow_dispatch:

jobs:
  limpiar:
    runs-on: ubuntu-latest
    steps:
      - name: Borrar huérfanos por FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          npm install basic-ftp@5 --no-fund --no-audit --silent
          cat > limpiar.mjs <<'EOF'
          import * as ftp from 'basic-ftp';
          const rel = [
            'assets/video/hero.mp4',
            'assets/video/cocina.mp4',
            'assets/video/hero-montaje.mp4',
            'assets/video/hero-old.mp4',
            'assets/img/real2-tartar.jpg',
            'assets/img/real2-tartar.webp',
            'assets/img/real2-carabineros.jpg',
            'assets/img/real2-carabineros.webp',
            'assets/img/real2-carne.jpg',
            'assets/img/real2-carne.webp',
            'assets/img/real2-jardin.jpg',
            'assets/img/real2-jardin.webp',
            'assets/img/real2-postre.jpg',
            'assets/img/real2-postre.webp',
            'assets/img/logo-zenorio.png',
            'assets/img/logo-wordmark.png',
            'assets/img/logo-zenorio-word.svg',
            'assets/img/logo-z.png',
            'assets/img/hero-poster.jpg',
          ];
          const c = new ftp.Client(30000);
          try {
            await c.access({ host: process.env.FTP_SERVER, user: process.env.FTP_USERNAME, password: process.env.FTP_PASSWORD, secure: true, secureOptions: { rejectUnauthorized: false } });
            // Detectar la base: si la raíz FTP contiene index.html => ya es public_html
            const raiz = (await c.list('/')).map(e => e.name);
            console.log('RAIZ FTP:', raiz.join(', '));
            const base = raiz.includes('index.html') ? '' : (raiz.includes('public_html') ? 'public_html/' : '');
            console.log('BASE elegida: "' + base + '"');
            for (const r of rel) {
              const p = base + r;
              try { await c.remove(p); console.log('BORRADO  ' + p); }
              catch (e) { console.log('(no) ' + p + '  [' + (e.code || e.message.split('\n')[0]) + ']'); }
            }
            try { await c.removeDir(base + 'assets/video'); console.log('BORRADA carpeta assets/video'); }
            catch (e) { console.log('(carpeta video) [' + (e.code || 'x') + ']'); }
          } finally { c.close(); }
          EOF
          node limpiar.mjs
