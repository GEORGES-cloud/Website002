name: Limpiar public_html (migracion a zenorio.es)

# ─────────────────────────────────────────────────────────────────────
# CONTEXTO (2026-07-06): la web se sirve desde la APP NODE conectada a
# GitHub (auto-deploy de Hostinger). La copia estática de public_html
# (que este workflow sincronizaba por FTP) creaba una SEGUNDA capa que
# servía los .html directamente y se saltaba la redirección 301 del
# dominio antiguo (zeñorio.com → zenorio.es), porque el LiteSpeed de
# Hostinger ignora las RewriteRule del .htaccess.
#
# Este workflow VACÍA public_html para que todas las peticiones caigan
# a la app Node (verificado: las rutas sin archivo estático llegan a
# Express, que sirve la web y aplica la redirección de dominio).
#
# Se lanza a mano (workflow_dispatch). Si algún día hay que restaurar
# la copia estática: recuperar el sync de este archivo del historial git.
# ─────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  limpiar:
    name: Vaciar public_html (la app Node sirve la web)
    runs-on: ubuntu-latest
    steps:
      - name: Borrar la copia estática por FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          npm install basic-ftp@5 --no-fund --no-audit --silent
          cat > limpiar.mjs <<'EOF'
          import * as ftp from 'basic-ftp';
          async function intento(n) {
            const c = new ftp.Client(30000);
            try {
              await c.access({ host: process.env.FTP_SERVER, user: process.env.FTP_USERNAME, password: process.env.FTP_PASSWORD, secure: true, secureOptions: { rejectUnauthorized: false } });
              const raiz = (await c.list('/')).map(e => e.name);
              const base = raiz.includes('public_html') ? '/public_html' : '/';
              await c.cd(base);
              const entradas = await c.list();
              console.log('Contenido de ' + base + ':', entradas.map(e => e.name).join(', ') || '(vacío)');
              for (const e of entradas) {
                if (e.name === '.' || e.name === '..') continue;
                if (e.isDirectory) {
                  console.log('  borrando carpeta ' + e.name + '/ ...');
                  await c.removeDir(e.name);
                } else {
                  console.log('  borrando ' + e.name);
                  await c.remove(e.name);
                }
              }
              const despues = await c.list();
              console.log('LIMPIO. Queda:', despues.filter(e => e.name !== '.' && e.name !== '..').map(e => e.name).join(', ') || '(vacío)');
              c.close();
              return true;
            } catch (e) { console.log('intento ' + n + ' falló: ' + e.message.split('\n')[0]); c.close(); return false; }
          }
          let ok = false;
          for (let n = 1; n <= 4 && !ok; n++) { ok = await intento(n); if (!ok) await new Promise(r => setTimeout(r, 5000)); }
          if (!ok) process.exit(1);
          EOF
          node limpiar.mjs
